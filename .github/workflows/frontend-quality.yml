name: Calidad y seguridad frontend

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  linting:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './ag-prueba-front/package-lock.json'

      - name: Instalar dependencias
        run: npm ci
        working-directory: ./ag-prueba-front

      - name: Ejecutar Linting
        run: npm run lint
        working-directory: ./ag-prueba-front

      # Aquí añadiremos más adelante el paso del SBOM (OKR 4)
