name: PR Review Monitor

on:
  # El flujo de trabajo se ejecuta cada hora para verificar el estado de los PRs.
  schedule:
    # Ajusta el cron: "0 * * * *" significa a los 0 minutos de cada hora.
    - cron: '0 * * * *'
  # Permite la ejecución manual desde la pestaña 'Actions'
  workflow_dispatch:

jobs:
  check_stale_prs:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Necesario para añadir etiquetas y comentarios
      issues: write        # También para añadir etiquetas y comentarios
      contents: read       # Necesario para el checkout

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check and Label Stale Pull Requests
        uses: actions/github-script@v7
        with:
          script: |
            const H_HOURS = 24; // *** DEFINIR EL LÍMITE DE HORAS AQUI (la 'h' de tu OKR) ***
            const STALE_LABEL = '🚨 Awaiting Review > 24h';
            const REPOSITORY = process.env.GITHUB_REPOSITORY;

            /**
             * Calcula la diferencia de tiempo en horas desde una fecha dada.
             */
            function calculateHoursSince(dateString) {
              const now = new Date();
              const targetDate = new Date(dateString);
              const diffTime = Math.abs(now - targetDate);
              // Convertir milisegundos a horas
              return diffTime / (1000 * 60 * 60);
            }
            
            // 1. Obtener la lista de Pull Requests abiertos y esperando revisión
            const { data: pullRequests } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            console.log(`Encontrados ${pullRequests.length} Pull Requests abiertos.`);

            for (const pr of pullRequests) {
              const prNumber = pr.number;
              
              // 2. Obtener las revisiones del PR
              const { data: reviews } = await github.rest.pulls.listReviews({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber
              });
              
              // 3. Determinar el estado de revisión:
              // Si no hay revisiones O la última revisión no es 'APPROVED'
              const needsReview = reviews.length === 0 || reviews.every(review => review.state !== 'APPROVED');
              
              if (needsReview) {
                // Usamos la fecha de creación del PR como el punto de inicio para la espera de revisión
                const hoursWaiting = calculateHoursSince(pr.created_at);
                
                if (hoursWaiting >= H_HOURS) {
                  // El PR ha superado el límite de h horas.
                  
                  // 4. Verificar si ya tiene la etiqueta de alerta
                  const hasStaleLabel = pr.labels.some(label => label.name === STALE_LABEL);

                  if (!hasStaleLabel) {
                    console.log(`PR #${prNumber} ha estado esperando ${hoursWaiting.toFixed(1)} horas. Añadiendo alerta.`);

                    // Añadir la etiqueta de alerta
                    await github.rest.issues.addLabels({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: prNumber,
                      labels: [STALE_LABEL]
                    });

                    // Añadir un comentario de alerta
                    await github.rest.issues.createComment({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: prNumber,
                      body: `⚠️ **ALERTA DE REVISIÓN STALE** ⚠️\n\nEste Pull Request ha estado abierto sin la aprobación final por más de **${H_HOURS} horas** (${hoursWaiting.toFixed(1)}h). Por favor, priorizar la revisión para acelerar el ciclo de lanzamiento (OKR 2).`
                    });

                  } else {
                    console.log(`PR #${prNumber} ya tiene la etiqueta de alerta.`);
                  }
                } else {
                  // Asegurarse de quitar la etiqueta si el PR se puso al día (ej. lo habían marcado como stale y alguien comentó)
                  const hasStaleLabel = pr.labels.some(label => label.name === STALE_LABEL);
                  if (hasStaleLabel) {
                      await github.rest.issues.removeLabel({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: prNumber,
                          name: STALE_LABEL
                      });
                  }
                }
              }
            }
