spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9000

# Exponer los endpoints de salud y métricas
management.endpoints.web.exposure.include=health,info,metrics,prometheus

# Mostrar detalles completos del estado de salud (Base de datos, disco, etc.)
management.endpoint.health.show-details=always

# Metadatos del aplicativo
info.app.name=Antigravity Backend
info.app.description=OAuth2 POC with Google Sign-In
info.app.version=1.0.0
