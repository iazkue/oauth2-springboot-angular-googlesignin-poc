spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

server.port=9000
spring.security.oauth2.client.registration.google-idp.provider=google
spring.security.oauth2.client.registration.google-idp.client-id=dummy-client-id
spring.security.oauth2.client.registration.google-idp.client-secret=dummy-client-secret
spring.security.oauth2.client.registration.google-idp.scope=openid,profile,email
spring.security.oauth2.client.registration.google-idp.client-name=ag-prueba-app
spring.security.oauth2.client.provider.google.user-name-attribute=email
